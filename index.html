<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rlaxogh76</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Markdown body styles — Reader 페이지에서 사용 */
      .markdown-body {
        color: var(--text-primary);
        line-height: 1.85;
        font-size: 15.5px;
      }
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4 {
        font-family: "DM Serif Display", serif;
        margin: 2.2em 0 0.8em;
        color: var(--text-primary);
      }
      .markdown-body h1 {
        font-size: 30px;
      }
      .markdown-body h2 {
        font-size: 24px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border-light);
      }
      .markdown-body h3 {
        font-size: 19px;
      }
      .markdown-body p {
        margin-bottom: 1.3em;
        color: var(--text-secondary);
      }
      .markdown-body strong {
        color: var(--text-primary);
        font-weight: 600;
      }
      .markdown-body em {
        color: var(--accent-dim);
        font-style: italic;
      }
      .markdown-body code {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        background: var(--bg-hover);
        padding: 2px 7px;
        border-radius: 4px;
        color: var(--accent);
      }
      .markdown-body pre {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        margin: 1.5em 0;
        overflow-x: auto;
      }
      .markdown-body pre code {
        background: none;
        padding: 0;
        color: var(--text-primary);
        font-size: 13px;
      }
      .markdown-body blockquote {
        border-left: 2px solid var(--accent);
        padding: 4px 0 4px 20px;
        margin: 1.5em 0;
        color: var(--text-secondary);
        font-style: italic;
      }
      .markdown-body ul,
      .markdown-body ol {
        margin: 1em 0 1.3em 1.4em;
        color: var(--text-secondary);
      }
      .markdown-body li {
        margin-bottom: 0.4em;
      }
      .markdown-body hr {
        border: none;
        border-top: 1px solid var(--border-light);
        margin: 2.5em 0;
      }
      .markdown-body a {
        color: var(--accent);
        text-decoration: underline;
        text-decoration-color: var(--accent-dim);
      }
      /* Fonts */
      .font-serif {
        font-family: "DM Serif Display", serif;
      }
      .font-mono {
        font-family: "DM Mono", monospace;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
